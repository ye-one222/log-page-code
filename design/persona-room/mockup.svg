  <text x="28" y="52" font-size="11.5" fill="#8A857C">복셀 가구 · 64px 픽셀 텍스처 + NearestFilter · 단색 금지 디더 · 탭 온리 · 걷기+카메라 팬 · 색은 personas.ts에서 파생</text>
