<svg viewBox="0 0 940 760" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <!-- 픽셀 디더 패턴 (2톤 체커, 단색 금지 규칙 표현) -->
    <pattern id="floorDither" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#C9A87C"/>
      <rect x="0" y="0" width="4" height="4" fill="#B8946A"/>
      <rect x="4" y="4" width="4" height="4" fill="#B8946A"/>
    </pattern>
    <pattern id="wallDither" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="#EFE7D8"/>
      <rect x="0" y="0" width="3" height="3" fill="#E2D6C1"/>
    </pattern>
    <pattern id="wallDitherL" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="#E7DDCB"/>
      <rect x="0" y="0" width="3" height="3" fill="#DBCFB8"/>
    </pattern>
  </defs>

