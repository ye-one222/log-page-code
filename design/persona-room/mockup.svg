  <rect x="498" y="688" width="34" height="26" rx="4" fill="#EDE7DC"/>
  <text x="496" y="726" font-size="8" fill="#9A9184" text-anchor="middle">copy → 캔버스 → dots → 피드</text>

  <!-- 주석 패널 -->
  <rect x="604" y="504" width="308" height="228" rx="10" fill="#FFFFFF" stroke="#E7E1D6" stroke-width="1.5"/>
  <text x="618" y="524" font-size="10.5" fill="#4A463F" font-weight="bold">핵심 인터랙션 규칙</text>
  <text x="618" y="544" font-size="9.5" fill="#5A554C">• 탭 온리: 가구 구역 탭 → 그 페르소나로. 오빗/드래그 없음</text>
  <text x="618" y="560" font-size="9.5" fill="#5A554C">• 탭 판정: 이동&lt;10px·400ms → touch-action:pan-y (스크롤 통과)</text>
  <text x="618" y="576" font-size="9.5" fill="#5A554C">• 전환: 캐릭터 걸어감(다리 교차) + 카메라 80ms lag 팬</text>
  <text x="618" y="592" font-size="9.5" fill="#5A554C">• busy 락: 전환 중 모든 탭/버튼 무시</text>
  <text x="618" y="608" font-size="9.5" fill="#5A554C">• 단일 진입점 goToPersona(id): 탭·dots·버튼 공유 → DOM 싱크</text>
  <text x="618" y="624" font-size="9.5" fill="#5A554C">• reduced-motion → cutTo (즉시 컷) / WebGL 실패 → dots만</text>
  <text x="618" y="640" font-size="9.5" fill="#5A554C">• 조명: Hemi+Dir + 활성 PointLight 1개(색=main) lerp</text>
  <text x="618" y="656" font-size="9.5" fill="#5A554C">• 성능: pixelRatio≤2, 뷰포트밖/비활성 탭 rAF 정지</text>
  <text x="618" y="672" font-size="9.5" fill="#5A554C">• 색·러그·라벨·조명 전부 personas.ts에서 파생</text>
  <text x="618" y="688" font-size="9.5" fill="#5A554C">• 방 중립색(우드/플라스터)만 하드코딩 허용</text>

